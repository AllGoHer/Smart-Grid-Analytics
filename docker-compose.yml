version: '3.8'

services:
  # ============================================================
  # POSTGRESQL - Base de datos principal
  # ============================================================
  postgres:
    image: postgres:15
    container_name: smart_grid_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: smartgrid
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init_tables.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d smartgrid"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-grid-network

  # ============================================================
  # KAFKA - Broker de mensajería en tiempo real
  # ============================================================
  kafka:
    image: apache/kafka:latest
    container_name: smart_grid_kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    networks:
      - smart-grid-network

  # ============================================================
  # FLINK JOBMANAGER - Coordinador del cluster Flink
  # ============================================================
  flink-jobmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: smart_grid_flink_jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 2048m
    volumes:
      - ./flink-sql:/opt/flink/usrlib-sql
      - ./flink-jars:/opt/flink/lib/extra
    depends_on:
      - kafka
      - postgres
    networks:
      - smart-grid-network

  # ============================================================
  # FLINK TASKMANAGER - Ejecutores de tareas
  # ============================================================
  flink-taskmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: smart_grid_flink_taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
    volumes:
      - ./flink-sql:/opt/flink/usrlib-sql
      - ./flink-jars:/opt/flink/lib/extra
    networks:
      - smart-grid-network

  # ============================================================
  # APACHE SUPERSET - Dashboard y visualización de datos
  # ============================================================
  superset:
    image: amancevice/superset:latest
    container_name: smart_grid_superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=your-secret-key-change-this
      - SUPERSET_LOAD_EXAMPLES=no
    volumes:
      - ./superset/superset_config.py:/etc/superset/superset_config.py
    command: >
      bash -c "
      superset db upgrade &&
      superset fab create-admin --username admin --password admin --firstname Admin --lastname User --email admin@admin.com || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088 --with-threads --reload --debugger
      "
    depends_on:
      - postgres
    networks:
      - smart-grid-network

# ============================================================
# VOLÚMENES - Almacenamiento persistente
# ============================================================
volumes:
  postgres_data:

# ============================================================
# REDES - Comunicación entre contenedores
# ============================================================
networks:
  smart-grid-network:
    driver: bridge